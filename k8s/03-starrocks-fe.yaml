# StarRocks Frontend (FE)
# MySQL 호환 포트: localhost:9030
# Web UI: http://localhost:8030
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: starrocks-fe
  namespace: semiconductor-poc
  labels:
    app: starrocks-fe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: starrocks-fe
  template:
    metadata:
      labels:
        app: starrocks-fe
    spec:
      containers:
        - name: starrocks-fe
          image: starrocks/fe-ubuntu:4.0-latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - bash /opt/starrocks/fe/bin/start_fe.sh --host_type IP
          env:
            - name: AWS_ACCESS_KEY_ID
              value: "admin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "password"
            - name: AWS_REGION
              value: "us-east-1"
          ports:
            - containerPort: 8030
              name: http
            - containerPort: 9020
              name: rpc
            - containerPort: 9030
              name: mysql
          readinessProbe:
            tcpSocket:
              port: 9030
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 9030
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "32Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
---
# ClusterIP Service — BE가 클러스터 내부에서 starrocks-fe:9030 으로 접근
apiVersion: v1
kind: Service
metadata:
  name: starrocks-fe
  namespace: semiconductor-poc
  labels:
    app: starrocks-fe
spec:
  type: ClusterIP
  selector:
    app: starrocks-fe
  ports:
    - name: http
      port: 8030
      targetPort: 8030
    - name: rpc
      port: 9020
      targetPort: 9020
    - name: mysql
      port: 9030
      targetPort: 9030
    - name: be-heartbeat
      port: 9010
      targetPort: 9010
---
# LoadBalancer Service — 로컬 호스트에서 localhost:9030 으로 접근 (Docker Desktop)
apiVersion: v1
kind: Service
metadata:
  name: starrocks-fe-lb
  namespace: semiconductor-poc
  labels:
    app: starrocks-fe
spec:
  type: LoadBalancer
  selector:
    app: starrocks-fe
  ports:
    - name: http
      port: 8030
      targetPort: 8030
    - name: mysql
      port: 9030
      targetPort: 9030
