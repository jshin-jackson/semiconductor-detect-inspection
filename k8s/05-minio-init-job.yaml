# MinIO 초기화 Job
# k8s-deploy.sh 에서 MinIO rollout 완료 확인 후 실행되므로 별도 wait initContainer 불필요.
# minio/mc 단일 이미지만 사용 — 추가 이미지 pull 없음.
# 재실행 가능 (--ignore-existing 옵션 사용)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: semiconductor-poc
  labels:
    app: minio-init
spec:
  # 실패 시 최대 3회 재시도
  backoffLimit: 3
  # 완료 후 120초 뒤 자동 삭제
  ttlSecondsAfterFinished: 120
  template:
    metadata:
      labels:
        app: minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-10-29T15-34-59Z
          imagePullPolicy: IfNotPresent
          env:
            - name: AWS_ACCESS_KEY_ID
              value: "admin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "password"
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "MinIO alias 등록..."
              /usr/bin/mc alias set minio http://minio:9000 admin password

              echo "warehouse 버킷 생성..."
              /usr/bin/mc mb --ignore-existing minio/warehouse

              echo "public 익명 정책 설정..."
              /usr/bin/mc anonymous set public minio/warehouse

              echo "MinIO 초기화 완료."
              /usr/bin/mc ls minio/warehouse
