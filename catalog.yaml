name: Semiconductor Detect Inspection

entries:
 - title: Semiconductor Wafer Defect Inspection
   label: semiconductor-wafer-defect-inspection
   short_description: |
     PaDiM-based anomaly detection for semiconductor wafer inspection with a full web UI. No real factory images required — synthetic data is generated automatically.
   long_description: |
     This AMP demonstrates a complete semiconductor wafer defect inspection pipeline using the PaDiM (Patch Distribution Modeling) anomaly detection algorithm.

     The system automatically generates synthetic wafer images, trains a PaDiM model (ResNet18 backbone) on normal images, and provides a React web UI for real-time defect detection with heatmap visualization. Inspection results are stored in Apache Iceberg via MinIO, with StarRocks for SQL-based analytics.

     Key highlights:
     - No real equipment images needed: synthetic normal and defect images (scratch, spot, contamination) are generated automatically
     - Full web UI: Dashboard, Inspect (drag-and-drop), History, and Stats pages
     - Automated pipeline: data generation → model training → inference server → web app, all wired as CML Jobs and an Application
     - External services (MinIO, Iceberg REST, StarRocks) are configurable via environment variables

